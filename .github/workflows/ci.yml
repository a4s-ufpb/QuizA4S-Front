name: Release - Version, Docker Image and Push

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  build-and-push:
    name: Build, Tag and Push
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Use Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      # Versão semver monotônica: 1.0.<nº da execução do workflow>.
      - name: Resolve version
        id: version
        run: |
          VERSION="1.0.${{ github.run_number }}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Version: $VERSION"

      - name: Install and build
        run: |
          npm ci
          npm run build

      # Docker + tag só em push na main (não em PR).
      - name: Docker Login
        if: github.event_name == 'push'
        uses: docker/login-action@v3.1.0
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Docker Image (version + latest)
        if: github.event_name == 'push'
        run: |
          docker build \
            --build-arg VITE_API_URL=${{ secrets.VITE_API_URL }} \
            --build-arg VITE_WS_URL=${{ secrets.VITE_WS_URL }} \
            -t ${{ secrets.DOCKER_USERNAME }}/frontend-quiz:${{ steps.version.outputs.version }} \
            -t ${{ secrets.DOCKER_USERNAME }}/frontend-quiz:latest .

      - name: Push Image to Docker Hub
        if: github.event_name == 'push'
        run: docker push ${{ secrets.DOCKER_USERNAME }}/frontend-quiz --all-tags

      - name: Create GitHub version tag
        if: github.event_name == 'push'
        run: |
          TAG="v${{ steps.version.outputs.version }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "Tag $TAG já existe — pulando."
          else
            git tag -a "$TAG" -m "Release $TAG"
            git push origin "$TAG"
          fi
